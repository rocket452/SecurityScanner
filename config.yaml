# SecurityScanner Configuration
target_domain: "platacard.mx"
output_file: "vuln_report.json"

# ==============================================================================
# BUG BOUNTY PROGRAM CONFIGURATION
# ==============================================================================
# Program-specific settings for responsible disclosure
#
# Priceline Bug Bounty Requirements:
# - Custom header: X-Bug-Bounty:your-HackerOne-username
# - Rate limiting: Be respectful, 1-2 requests per second recommended
# - Test window: Anytime, but be mindful of traffic
# - SLA: 2 business days initial triage, bounty within 1-2 weeks
# ==============================================================================

bug_bounty:
  program: "priceline"
  hackerone_username: "nulllfungus"
  
  # Custom headers required by program
  custom_headers:
    X-Bug-Bounty: "nulllfungus"
  
  # Program-specific rate limits (requests per second)
  # Priceline recommends conservative scanning
  max_requests_per_second: 2

# ==============================================================================
# RATE LIMITING & PERFORMANCE SETTINGS
# ==============================================================================
# Adjust these values to control scan speed and avoid rate limiting/blocking
# Lower values = slower but stealthier, Higher values = faster but more aggressive

rate_limiting:
  # ffuf (directory fuzzing) thread count
  # Default: 20 (conservative)
  # Range: 5 (very slow/stealthy) to 100 (fast/aggressive)
  ffuf_threads: 20

  # Nuclei rate limit (requests per minute)
  nuclei_rate_limit: 120

  # Nuclei concurrency (parallel templates)
  nuclei_concurrency: 15

  # Per-scanner HTTP timeouts (seconds)
  # Using per-scanner values avoids a single slow check blocking everything.
  http_timeout: 30          # default fallback
  xss_timeout: 120          # param discovery + payload testing can be slow
  admin_timeout: 10         # quick admin panel probes
  backup_timeout: 10        # quick backup file probes
  bucket_timeout: 10        # quick storage path probes
  directory_fuzz_timeout: 180  # recursive ffuf can be slow

  # Domain-level parallelism: how many live domains to scan concurrently
  domain_scan_workers: 6

  # Intra-domain parallelism: concurrent admin/backup/xss/bucket tasks per domain
  path_probe_concurrency: 8

  # Delay between requests (milliseconds) - only applied to same-domain sequential
  # requests that don't already run in parallel threads.
  # Set 0 for max speed; use 200-500 if the target rate-limits aggressively.
  request_delay: 200

# ==============================================================================
# OWASP ZAP CONFIGURATION
# ==============================================================================
# ZAP proxy settings for web application security scanning
#
# When running via docker-compose: use http://zap:8080 (internal docker network)
# When running locally: use http://localhost:8080
# ==============================================================================

zap:
  enabled: false  # Changed to false - use --zap flag to enable
  # Use 'http://zap:8080' when running in Docker, 'http://localhost:8080' when running locally
  proxy_url: http://localhost:8080
  api_key: null  # Optional, not needed if API key disabled in ZAP
  timeout: 300   # Scan timeout in seconds
  spider: true   # Enable web crawler
  passive_scan: true   # Enable passive vulnerability detection
  active_scan: false   # Enable active scanning (use with caution!)
  max_spider_depth: 5  # Maximum crawl depth

# ==============================================================================
# XSS SCANNING CONFIGURATION
# ==============================================================================
# Advanced XSS detection settings

xss:
  mode: advanced  # Options: basic, advanced, exploitation
  timeout: 120  # Request timeout in seconds
  callback_url: null  # For blind XSS detection (e.g., Burp Collaborator)
  safe_mode: false  # Unsafe by default; use --safe for bounded payloads
  standard_enabled: true  # Run standard (reflected) XSS scanning by default
  breakout_enabled: true  # Run breakout XSS scanning by default
  stored_enabled: true  # Attempt stored XSS form workflows by default
  max_payloads_per_param: 20  # Limit payloads per parameter to balance coverage vs. load
  arjun_threads: 10
  arjun_timeout: 120
  arjun_wordlist: ./wordlists/arjun_params.txt  # Optional custom wordlist path
  fallback_params: ["q", "search", "query", "keyword", "term", "id", "page", "url", "redirect", "name"]
  crawl_enabled: true
  crawl_max_pages: 100
  crawl_max_depth: 3

# ==============================================================================
# AI REPORT GENERATION
# ==============================================================================
# Configuration for AI-powered HackerOne report generation
# Supports OpenAI (GPT-4) and Anthropic (Claude) models
#
# Get your API keys:
# - OpenAI: https://platform.openai.com/api-keys
# - Anthropic: https://console.anthropic.com/
#
# Set API keys in .env file:
# OPENAI_API_KEY=your_key_here
# ANTHROPIC_API_KEY=your_key_here
# ==============================================================================

ai_reports:
  enabled: true
  # AI provider: 'openai' or 'anthropic'
  provider: openai
  
  # Model selection
  # OpenAI options: gpt-4o, gpt-4-turbo, gpt-4
  # Anthropic options: claude-3-5-sonnet-20241022, claude-3-opus-20240229
  model: gpt-4o
  
  # Auto-generate reports after scan completes
  auto_generate: false
  
  # Output directory for generated reports
  output_dir: ./h1_reports

# ==============================================================================
# API KEYS FOR ENHANCED SUBDOMAIN DISCOVERY
# ==============================================================================
# Add your free API keys below to significantly increase subdomain discovery.
# These services are used by both Amass and Subfinder.
#
# How to get free API keys:
# - Shodan: https://account.shodan.io/register (100 results/month free)
# - Censys: https://censys.io/register (250 queries/month free)
# - VirusTotal: https://www.virustotal.com/gui/join-us (500 requests/day free)
# - SecurityTrails: https://securitytrails.com/app/signup (50 queries/month free)
# - GitHub: https://github.com/settings/tokens (Unlimited for public repos)
# - URLScan: https://urlscan.io/user/signup (1000 scans/day free)
#
# Leave blank if you don't have the API key
# ==============================================================================

api_keys:
  # Shodan - Network intelligence
  shodan: ""
  
  # Censys - Internet-wide scanning
  censys_id: ""
  censys_secret: ""
  
  # VirusTotal - Threat intelligence
  virustotal: ""
  
  # SecurityTrails - DNS history
  securitytrails: ""
  
  # GitHub - Code search for subdomains
  github: ""
  
  # URLScan - URL scanner
  urlscan: ""
  
  # PassiveTotal (RiskIQ)
  passivetotal_username: ""
  passivetotal_key: ""
  
  # BinaryEdge
  binaryedge: ""
  
  # Chaos (ProjectDiscovery)
  chaos: ""
